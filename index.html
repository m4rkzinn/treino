<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treino">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Treino Kaiky</title>
<style>
:root{--bg:#09111f;--panel:#111b2e;--card:#162238;--text:#f8fafc;--muted:#9fb0c8;--line:#263751;--accent:#22c55e;--danger:#fb7185;--shadow:0 14px 34px rgba(0,0,0,.25)}
:root.light{--bg:#eef2f7;--panel:#fff;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#dbe3ee;--accent:#16a34a;--danger:#e11d48;--shadow:0 12px 28px rgba(15,23,42,.08)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:calc(92px + env(safe-area-inset-bottom))}
button{font:inherit}.app{max-width:540px;margin:auto;min-height:100vh}.top{position:sticky;top:0;z-index:20;padding:calc(12px + env(safe-area-inset-top)) 14px 10px;background:linear-gradient(180deg,var(--bg) 82%,transparent)}
.hero{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:24px;padding:17px}.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
h1{font-size:28px;line-height:1;margin:0 0 6px;letter-spacing:-.8px}.sub{color:var(--muted);font-size:13px}.actions{display:flex;gap:8px}.icon-btn{width:42px;height:42px;border:none;border-radius:14px;background:var(--card);color:var(--text);border:1px solid var(--line);font-size:18px}
.days{display:flex;gap:8px;overflow:auto;padding:12px 2px 2px;scrollbar-width:none}.days::-webkit-scrollbar{display:none}.day-btn{flex:0 0 auto;border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:999px;padding:10px 14px;font-weight:800}.day-btn.active{color:white;border-color:transparent;background:var(--day-color,#22c55e)}
main{padding:0 14px 24px}.day-head{margin:8px 0 14px;padding:18px;border-radius:22px;color:#fff;background:linear-gradient(135deg,var(--day-color),color-mix(in srgb,var(--day-color) 68%,#000));box-shadow:var(--shadow)}.day-head h2{margin:0;font-size:26px}.day-head p{margin:5px 0 0;opacity:.9;font-size:14px}
.exercise{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:17px;margin:12px 0;box-shadow:var(--shadow)}.exercise h3{font-size:20px;margin:0 0 2px;letter-spacing:-.3px}.en{color:var(--muted);font-size:13px;margin-bottom:12px}
.pills{display:grid;grid-template-columns:1.25fr 1fr 1fr;gap:8px;margin-bottom:14px}.pill{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 9px;min-width:0}.pill small{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}.pill strong{font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:.75px;font-weight:900;margin:12px 0 6px}.do{color:var(--accent)}.avoid{color:var(--danger)}ul{margin:0;padding-left:19px}li{margin:5px 0;line-height:1.35}
.timer-btn{width:100%;margin-top:14px;border:none;border-radius:15px;padding:12px 14px;background:var(--day-color);color:#fff;font-weight:900}.rules{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:17px;margin:14px 0}.rules h3{margin:0 0 9px}.rules p{color:var(--muted);margin:7px 0;line-height:1.4}
.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(10px + env(safe-area-inset-bottom));width:min(calc(100% - 22px),510px);z-index:30;background:color-mix(in srgb,var(--panel) 92%,transparent);backdrop-filter:blur(18px);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:20px;padding:8px;display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.bottom button{border:none;background:transparent;color:var(--muted);padding:9px 3px;border-radius:13px;font-size:12px;font-weight:900}.bottom button.active{background:var(--day-color);color:#fff}
.modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.62);display:none;align-items:flex-end}.modal.show{display:flex}.sheet{width:100%;max-width:540px;margin:auto;background:var(--panel);border-radius:28px 28px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom));border:1px solid var(--line)}.timer{font-size:56px;font-weight:950;text-align:center;margin:18px 0;letter-spacing:-2px}.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.sheet button{border:none;border-radius:15px;padding:14px;font-weight:900}.primary{background:var(--accent);color:#fff}.secondary{background:var(--card);color:var(--text);border:1px solid var(--line)!important}.install-help{font-size:14px;color:var(--muted);line-height:1.55}
@media(max-width:360px){.pills{grid-template-columns:1fr 1fr}.pill:first-child{grid-column:1/-1}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="hero"><div class="row"><div><h1>Treino Kaiky</h1><div class="sub">Definição + hipertrofia • 55–60 min</div></div><div class="actions"><button class="icon-btn" id="themeBtn" aria-label="Alternar tema">☀️</button><button class="icon-btn" id="installBtn" aria-label="Instalar">↗️</button></div></div><div class="days" id="dayTabs"></div></div></header>
<main id="content"></main>
</div>
<nav class="bottom" id="bottomNav"></nav>
<div class="modal" id="timerModal"><div class="sheet"><div class="sub" id="timerLabel">Descanso</div><div class="timer" id="timerText">01:30</div><div class="sheet-actions"><button class="secondary" id="closeTimer">Fechar</button><button class="primary" id="restartTimer">Reiniciar</button></div></div></div>
<div class="modal" id="installModal"><div class="sheet"><h2 style="margin-top:0">Instalar no iPhone</h2><div class="install-help">Abra este endereço no <b>Safari</b>, toque em <b>Compartilhar</b> e depois em <b>Adicionar à Tela de Início</b>. Depois disso, ele abre em tela cheia como um app e funciona offline.</div><button class="primary" style="width:100%;margin-top:18px" id="closeInstall">Entendi</button></div></div>
<script>
const workouts={"seg": {"label": "Segunda", "title": "Push", "focus": "Peito • Ombros • Tríceps", "color": "#ef4444", "exercises": [{"pt": "Supino Reto", "en": "Bench Press", "muscle": "Peitoral", "sets": "4×6–8", "rest": 150, "do": ["Desça em cerca de 2 segundos", "Encoste levemente no peito", "Suba com força e controle"], "avoid": ["Levantar o quadril", "Abrir demais os cotovelos"]}, {"pt": "Supino Inclinado com Halteres", "en": "Incline Dumbbell Press", "muscle": "Peitoral superior", "sets": "3×8–10", "rest": 90, "do": ["Banco em inclinação moderada", "Desça com amplitude confortável", "Mantenha os punhos firmes"], "avoid": ["Bater os halteres", "Arquear demais a lombar"]}, {"pt": "Desenvolvimento com Halteres", "en": "Dumbbell Shoulder Press", "muscle": "Ombros", "sets": "3×8–10", "rest": 90, "do": ["Mantenha o core firme", "Desça até uma amplitude confortável", "Suba sem perder o controle"], "avoid": ["Arquear a lombar", "Bater os halteres no topo"]}, {"pt": "Elevação Lateral", "en": "Lateral Raise", "muscle": "Deltoide lateral", "sets": "3×12–15", "rest": 60, "do": ["Use carga leve a moderada", "Eleve até a linha dos ombros", "Controle a descida"], "avoid": ["Usar impulso", "Encolher os ombros"]}, {"pt": "Tríceps na Corda", "en": "Cable Rope Pushdown", "muscle": "Tríceps", "sets": "3×10–12", "rest": 60, "do": ["Mantenha os cotovelos junto ao corpo", "Abra a corda no final", "Controle a volta"], "avoid": ["Mover os ombros", "Inclinar o corpo demais"]}, {"pt": "Tríceps Francês", "en": "Overhead Triceps Extension", "muscle": "Tríceps", "sets": "2×10–12", "rest": 60, "do": ["Mantenha os cotovelos apontando à frente", "Alongue com controle", "Suba sem impulso"], "avoid": ["Abrir os cotovelos", "Usar peso excessivo"]}]}, "ter": {"label": "Terça", "title": "Pull", "focus": "Costas • Bíceps", "color": "#3b82f6", "exercises": [{"pt": "Barra Fixa Assistida", "en": "Assisted Pull-Up", "muscle": "Costas", "sets": "3×6–10", "rest": 120, "do": ["Comece com os ombros para baixo", "Puxe o peito em direção à barra", "Desça com controle"], "avoid": ["Balançar o corpo", "Encolher os ombros"]}, {"pt": "Puxada Frontal", "en": "Lat Pulldown", "muscle": "Costas", "sets": "3×8–10", "rest": 90, "do": ["Mantenha o peito aberto", "Puxe com os cotovelos", "Controle a subida"], "avoid": ["Puxar atrás da cabeça", "Jogar o corpo para trás"]}, {"pt": "Remada Baixa", "en": "Seated Cable Row", "muscle": "Costas", "sets": "3×8–10", "rest": 90, "do": ["Peito aberto e coluna neutra", "Puxe em direção ao abdômen", "Aproxime as escápulas"], "avoid": ["Usar impulso", "Arredondar a lombar"]}, {"pt": "Face Pull", "en": "Face Pull", "muscle": "Deltoide posterior", "sets": "3×12–15", "rest": 60, "do": ["Puxe a corda em direção ao rosto", "Mantenha os cotovelos altos", "Separe as mãos no final"], "avoid": ["Encolher os ombros", "Usar carga excessiva"]}, {"pt": "Rosca Direta", "en": "Barbell Curl", "muscle": "Bíceps", "sets": "3×10–12", "rest": 60, "do": ["Mantenha os cotovelos parados", "Suba sem balançar", "Desça quase até estender"], "avoid": ["Roubar com a lombar", "Jogar os cotovelos para frente"]}, {"pt": "Rosca Martelo", "en": "Hammer Curl", "muscle": "Braquial e bíceps", "sets": "2×10–12", "rest": 60, "do": ["Mantenha os punhos neutros", "Cotovelos junto ao corpo", "Controle a descida"], "avoid": ["Balançar o corpo", "Acelerar a descida"]}]}, "qua": {"label": "Quarta", "title": "Legs", "focus": "Quadríceps • Posterior • Panturrilha", "color": "#8b5cf6", "exercises": [{"pt": "Agachamento", "en": "Back Squat", "muscle": "Quadríceps e glúteos", "sets": "4×6–8", "rest": 150, "do": ["Pés firmes no chão", "Joelhos acompanham a direção dos pés", "Desça até uma amplitude segura"], "avoid": ["Arredondar a lombar", "Joelhos colapsarem para dentro"]}, {"pt": "Levantamento Romeno", "en": "Romanian Deadlift", "muscle": "Posterior e glúteos", "sets": "3×8–10", "rest": 120, "do": ["Empurre o quadril para trás", "Mantenha a carga perto das pernas", "Pare ao sentir bom alongamento"], "avoid": ["Curvar as costas", "Transformar em agachamento"]}, {"pt": "Leg Press", "en": "Leg Press", "muscle": "Quadríceps", "sets": "3×10–12", "rest": 90, "do": ["Mantenha a lombar apoiada", "Desça com controle", "Empurre com o pé inteiro"], "avoid": ["Tirar o quadril do banco", "Travar os joelhos com força"]}, {"pt": "Mesa Flexora", "en": "Leg Curl", "muscle": "Posterior de coxa", "sets": "3×10–12", "rest": 60, "do": ["Ajuste o eixo da máquina ao joelho", "Contraia no final", "Controle a volta"], "avoid": ["Levantar o quadril", "Soltar o peso"]}, {"pt": "Panturrilha em Pé", "en": "Standing Calf Raise", "muscle": "Panturrilha", "sets": "4×12–15", "rest": 60, "do": ["Desça até alongar", "Suba o máximo possível", "Pause 1 segundo no topo"], "avoid": ["Movimento curto", "Quicar rapidamente"]}]}, "qui": {"label": "Quinta", "title": "Upper", "focus": "Peito • Costas • Ombros • Braços", "color": "#f59e0b", "exercises": [{"pt": "Supino Máquina", "en": "Chest Press Machine", "muscle": "Peitoral", "sets": "3×8–10", "rest": 90, "do": ["Ajuste o banco na linha do peito", "Desça com controle", "Empurre sem perder a postura"], "avoid": ["Travar os cotovelos com força", "Tirar as costas do encosto"]}, {"pt": "Remada na Máquina com Apoio no Peito", "en": "Chest-Supported Row", "muscle": "Costas", "sets": "3×8–10", "rest": 90, "do": ["Mantenha o peito apoiado", "Puxe os cotovelos para trás", "Controle a volta"], "avoid": ["Encolher os ombros", "Tirar o peito do apoio"]}, {"pt": "Peck Deck", "en": "Pec Deck", "muscle": "Peitoral", "sets": "2×12–15", "rest": 60, "do": ["Mantenha o peito aberto", "Feche os braços com controle", "Alongue sem forçar o ombro"], "avoid": ["Bater os pesos", "Projetar a cabeça para frente"]}, {"pt": "Elevação Lateral", "en": "Lateral Raise", "muscle": "Deltoide lateral", "sets": "3×12–15", "rest": 60, "do": ["Use carga controlável", "Eleve até a linha dos ombros", "Desça devagar"], "avoid": ["Usar impulso", "Encolher os ombros"]}, {"pt": "Rosca Scott", "en": "Preacher Curl", "muscle": "Bíceps", "sets": "3×10–12", "rest": 60, "do": ["Mantenha os braços apoiados", "Desça com controle", "Suba sem tirar o braço do banco"], "avoid": ["Estender com impacto", "Levantar os cotovelos"]}, {"pt": "Tríceps na Corda", "en": "Cable Rope Pushdown", "muscle": "Tríceps", "sets": "2×10–12", "rest": 60, "do": ["Cotovelos fixos", "Abra a corda no final", "Controle a volta"], "avoid": ["Mover os ombros", "Usar o peso do corpo"]}]}, "sex": {"label": "Sexta", "title": "Lower + Core", "focus": "Pernas • Deltoide posterior • Abdômen", "color": "#10b981", "exercises": [{"pt": "Hack Squat", "en": "Hack Squat", "muscle": "Quadríceps", "sets": "3×8–10", "rest": 120, "do": ["Mantenha costas e quadril apoiados", "Desça com controle", "Empurre com o pé inteiro"], "avoid": ["Descolar a lombar", "Joelhos colapsarem"]}, {"pt": "Hip Thrust", "en": "Hip Thrust", "muscle": "Glúteos", "sets": "3×8–10", "rest": 90, "do": ["Queixo levemente recolhido", "Suba até alinhar o tronco", "Pause 1 segundo no topo"], "avoid": ["Hiperestender a lombar", "Empurrar só com a ponta dos pés"]}, {"pt": "Cadeira Extensora", "en": "Leg Extension", "muscle": "Quadríceps", "sets": "3×12–15", "rest": 60, "do": ["Ajuste o eixo ao joelho", "Suba com controle", "Contraia no topo"], "avoid": ["Chutar o peso", "Descer rápido"]}, {"pt": "Mesa Flexora", "en": "Leg Curl", "muscle": "Posterior de coxa", "sets": "3×12", "rest": 60, "do": ["Ajuste a máquina corretamente", "Contraia no final", "Volte devagar"], "avoid": ["Levantar o quadril", "Soltar o peso"]}, {"pt": "Panturrilha Sentada", "en": "Seated Calf Raise", "muscle": "Panturrilha", "sets": "4×12–15", "rest": 60, "do": ["Desça até alongar", "Suba o máximo possível", "Pause no topo"], "avoid": ["Movimento curto", "Quicar"]}, {"pt": "Reverse Pec Deck", "en": "Reverse Pec Deck", "muscle": "Deltoide posterior", "sets": "3×12–15", "rest": 60, "do": ["Peito apoiado", "Abra os braços em arco", "Mantenha os ombros para baixo"], "avoid": ["Usar impulso", "Encolher os ombros"]}, {"pt": "Elevação de Pernas", "en": "Leg Raise", "muscle": "Abdômen", "sets": "3×12–15", "rest": 45, "do": ["Contraia o abdômen", "Suba sem embalo", "Desça com controle"], "avoid": ["Balançar o corpo", "Arquear demais a lombar"]}, {"pt": "Prancha", "en": "Plank", "muscle": "Core", "sets": "3×45–60 s", "rest": 45, "do": ["Corpo em linha reta", "Contraia abdômen e glúteos", "Respire normalmente"], "avoid": ["Deixar o quadril cair", "Elevar demais o quadril"]}]}};
const order=["seg","ter","qua","qui","sex"];let activeDay=localStorage.getItem("activeDay")||"seg";let timerSeconds=0,timerInitial=0,timerId=null;
const content=document.getElementById("content"),dayTabs=document.getElementById("dayTabs"),bottomNav=document.getElementById("bottomNav");
function fmt(s){const m=Math.floor(s/60),r=s%60;return `${String(m).padStart(2,"0")}:${String(r).padStart(2,"0")}`}
function renderNav(){dayTabs.innerHTML="";bottomNav.innerHTML="";order.forEach(k=>{const d=workouts[k];const t=document.createElement("button");t.className="day-btn"+(k===activeDay?" active":"");t.style.setProperty("--day-color",d.color);t.textContent=d.label;t.onclick=()=>selectDay(k);dayTabs.appendChild(t);const b=document.createElement("button");b.className=k===activeDay?"active":"";b.style.setProperty("--day-color",d.color);b.textContent=d.label.slice(0,3).toUpperCase();b.onclick=()=>selectDay(k);bottomNav.appendChild(b)})}
function renderDay(){const d=workouts[activeDay];document.documentElement.style.setProperty("--day-color",d.color);content.innerHTML=`<section class="day-head" style="--day-color:${d.color}"><h2>${d.label} • ${d.title}</h2><p>${d.focus}</p></section>${d.exercises.map((e,i)=>`<article class="exercise"><h3>${i+1}. ${e.pt}</h3><div class="en">${e.en}</div><div class="pills"><div class="pill"><small>Foco</small><strong>${e.muscle}</strong></div><div class="pill"><small>Séries</small><strong>${e.sets}</strong></div><div class="pill"><small>Descanso</small><strong>${fmt(e.rest)}</strong></div></div><div class="section-title do">Como fazer</div><ul>${e.do.map(x=>`<li>${x}</li>`).join("")}</ul><div class="section-title avoid">Evite</div><ul>${e.avoid.map(x=>`<li>${x}</li>`).join("")}</ul><button class="timer-btn" style="--day-color:${d.color}" onclick="startTimer(${e.rest},'${e.pt.replaceAll("'","\\'")}')">Iniciar descanso • ${fmt(e.rest)}</button></article>`).join("")}<section class="rules"><h3>Regras rápidas</h3><p><b>Exercícios principais:</b> termine com 1–2 repetições na reserva.</p><p><b>Isoladores:</b> a última série pode chegar bem perto da falha.</p><p><b>Progressão:</b> atingiu o topo das repetições em todas as séries com técnica boa? Aumente um pouco a carga.</p></section>`;window.scrollTo({top:0,behavior:"instant"})}
function selectDay(k){activeDay=k;localStorage.setItem("activeDay",k);renderNav();renderDay()}
function startTimer(s,label){clearInterval(timerId);timerSeconds=timerInitial=s;document.getElementById("timerLabel").textContent=`Descanso • ${label}`;updateTimer();document.getElementById("timerModal").classList.add("show");timerId=setInterval(()=>{timerSeconds--;updateTimer();if(timerSeconds<=0){clearInterval(timerId);if(navigator.vibrate)navigator.vibrate([200,100,200]);document.getElementById("timerLabel").textContent="Descanso concluído"}},1000)}
function updateTimer(){document.getElementById("timerText").textContent=fmt(Math.max(0,timerSeconds))}
document.getElementById("closeTimer").onclick=()=>{clearInterval(timerId);document.getElementById("timerModal").classList.remove("show")};
document.getElementById("restartTimer").onclick=()=>startTimer(timerInitial,document.getElementById("timerLabel").textContent.replace("Descanso • ",""));
const root=document.documentElement,saved=localStorage.getItem("theme");if(saved==="light")root.classList.add("light");function themeIcon(){document.getElementById("themeBtn").textContent=root.classList.contains("light")?"🌙":"☀️"}themeIcon();document.getElementById("themeBtn").onclick=()=>{root.classList.toggle("light");localStorage.setItem("theme",root.classList.contains("light")?"light":"dark");themeIcon()};
document.getElementById("installBtn").onclick=()=>document.getElementById("installModal").classList.add("show");document.getElementById("closeInstall").onclick=()=>document.getElementById("installModal").classList.remove("show");
if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
renderNav();renderDay();
</script>
</body>
</html>
